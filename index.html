<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI mokumoku UX</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 36'><mask id='m'><rect width='100%25' height='100%25' fill='white'/><circle cx='24' cy='16' r='2' fill='black'/><circle cx='30' cy='18' r='2' fill='black'/><path d='M14 23 L15 27 L18 25' stroke='black' stroke-width='2' fill='none'/></mask><g mask='url(%23m)'><ellipse cx='10' cy='22' rx='9' ry='8' fill='%238b7355'/><ellipse cx='22' cy='16' rx='14' ry='12' fill='%238b7355'/><ellipse cx='36' cy='22' rx='8' ry='7' fill='%238b7355'/><ellipse cx='16' cy='26' rx='10' ry='8' fill='%238b7355'/><ellipse cx='30' cy='26' rx='10' ry='8' fill='%238b7355'/></g></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 100%); color: #e8e6e3; font-family: "Noto Sans JP", sans-serif; font-weight: 300; line-height: 1.8; }
    .header { border-bottom: 1px solid #2a2a2a; padding: 24px 48px; display: flex; justify-content: space-between; align-items: center; background: rgba(10,10,10,0.95); position: sticky; top: 0; z-index: 100; }
    .header-title-sub { font-size: 14px; letter-spacing: 0.2em; color: #b8956a; margin-bottom: 4px; }
    .header-title-main { font-size: 24px; font-weight: 300; display: flex; align-items: center; gap: 8px; }
    .header-progress { display: flex; align-items: center; gap: 12px; }
    .data-sync-btns { display: flex; gap: 6px; margin-left: auto; align-items: center; flex-shrink: 0; }
    .sync-btn { display: flex; align-items: center; gap: 5px; padding: 5px 12px; background: transparent; border: 1px solid #3a3a3a; color: #999; font-size: 11px; font-family: inherit; cursor: pointer; letter-spacing: 0.05em; transition: border-color 0.2s, color 0.2s; border-radius: 4px; }
    .sync-btn:hover { border-color: #b8956a; color: #b8956a; }
    .progress-label { font-size: 10px; color: #888; letter-spacing: 0.1em; }
    .progress-value { font-size: 18px; font-weight: 300; color: #b8956a; }
    .progress-bar { width: 80px; height: 2px; background: #2a2a2a; border-radius: 2px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #b8956a, #c9a87c); transition: width 0.5s; }
    .learning-section-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 32px; }
    .header-module-name { font-size: 10px; letter-spacing: 0.15em; color: #b8956a; margin-top: 4px; }
    .learning-module-name { font-size: 11px; letter-spacing: 0.15em; color: #b8956a; }
    .module-fixed-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 95; background: rgba(10,10,10,0.97); border-bottom: 1px solid #2a2a2a; padding: 7px 48px; display: flex; justify-content: space-between; align-items: center; transform: translateY(-100%); transition: transform 0.2s ease; pointer-events: none; }
    .module-fixed-bar.show { transform: translateY(0); }
    .module-fixed-bar-text { font-size: 11px; color: #888; letter-spacing: 0.15em; }
    .module-fixed-bar-text span { color: #b8956a; }
    .nav { display: flex; padding: 0 48px; border-bottom: 1px solid #2a2a2a; background: #0f0f0f; }
    .nav-btn { padding: 16px 32px; background: transparent; border: none; border-bottom: 2px solid transparent; color: #999; font-size: 14px; font-family: inherit; cursor: pointer; }
    .nav-btn:hover { color: #999; }
    .nav-btn.active { border-bottom-color: #b8956a; color: #e8e6e3; }
    .main { padding: 48px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .section-title { font-size: 12px; letter-spacing: 0.2em; color: #999; margin-bottom: 32px; }
    .learning-container { max-width: 900px; }
    .learning-module-select { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
    .learning-module-btn { padding: 8px 16px; background: #1a1a1a; border: 1px solid #2a2a2a; color: #999; font-size: 14px; font-family: inherit; cursor: pointer; position: relative; }
    .learning-module-btn:hover { border-color: #b8956a; color: #b0a090; }
    .learning-module-btn.active { background: #b8956a; border-color: #b8956a; color: #0a0a0a; }
    .learning-module-btn.locked { opacity: 0.4; cursor: not-allowed; }
    .learning-module-btn.current::after { content: ''; position: absolute; top: -4px; right: -4px; width: 8px; height: 8px; background: #b8956a; border-radius: 50%; }
    .learning-section { background: #141414; border: 1px solid #2a2a2a; border-radius: 5px; padding: 40px; margin-bottom: 24px; }
    .learning-section-title { font-size: 12px; color: #b8956a; letter-spacing: 0.2em; margin-bottom: 24px; }
    .learning-content h3 { font-size: 18px; color: #e8e6e3; margin: 32px 0 16px 0; }
    .learning-content h3:first-child { margin-top: 0; }
    .learning-content p { color: #b0a090; margin-bottom: 16px; font-size: 15px; }
    .learning-content p + p { margin-top: -4px; }
    .topic-block { margin-bottom: 32px; padding-bottom: 32px; border-bottom: 1px solid #222; }
    .topic-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .topic-title { font-size: 16px; color: #e8e6e3; margin-bottom: 16px; font-weight: 400; }
    .topic-body { color: #b0a090; font-size: 15px; line-height: 1.9; }
    .topic-body p { margin-bottom: 14px; }
    .topic-body p:last-child { margin-bottom: 0; }
    .topic-plus { border-left: 3px solid #b8956a; padding-left: 20px; margin-top: 32px; }
    .topic-plus .topic-title { color: #c9a87c; font-size: 15px; }
    .reference-item { padding: 16px 20px; background: #1a1a1a; border: 1px solid #252525; border-radius: 5px; margin-bottom: 12px; }
    .reference-item-title { font-size: 15px; color: #e8e6e3; margin-bottom: 4px; }
    .reference-item-author { font-size: 13px; color: #999; margin-bottom: 8px; }
    .reference-item-desc { font-size: 13px; color: #888; }
    .worksheet-title { font-size: 16px; margin-bottom: 8px; color: #e8e6e3; }
    .worksheet-desc { font-size: 14px; color: #888; margin-bottom: 24px; }
    .worksheet-field { margin-bottom: 24px; }
    .worksheet-label { font-size: 13px; color: #b8956a; margin-bottom: 8px; display: block; }
    .worksheet-input { width: 100%; padding: 12px 16px; background: #0a0a0a; border: 1px solid #2a2a2a; color: #e8e6e3; font-size: 14px; font-family: inherit; }
    .worksheet-input:focus { outline: none; border-color: #b8956a; }
    .worksheet-textarea { width: 100%; min-height: 120px; padding: 16px; background: #0a0a0a; border: 1px solid #2a2a2a; color: #e8e6e3; font-size: 14px; line-height: 1.7; font-family: inherit; resize: vertical; }
    .worksheet-textarea:focus { outline: none; border-color: #b8956a; }
    .btn-submit { padding: 10px 50px; background: #0a0a0a; border: 1px solid #b8956a; border-radius: 50px; color: #b8956a; font-size: 15px; font-family: inherit; cursor: pointer; margin-top: 24px; display: block; margin-left: auto; margin-right: auto; }
    .btn-submit:hover { background: #1a1915; }
    .btn-submit.submitted { background: #1a1915; color: #a08060; }
    .feedback-section { margin-top: 24px; padding-top: 20px; border-top: 1px dashed #2a2a2a; }
    .feedback-label { font-size: 12px; color: #999; margin-bottom: 8px; display: block; }
    .feedback-textarea { width: 100%; min-height: 80px; padding: 12px; background: #0a0a0a; border: 1px solid #2a2a2a; color: #e8e6e3; font-size: 13px; line-height: 1.6; font-family: inherit; resize: vertical; }
    .feedback-textarea:focus { outline: none; border-color: #b8956a; }
    .schedule-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .schedule-item { background: #141414; border: 1px solid #2a2a2a; border-radius: 5px; padding: 20px; cursor: pointer; transition: border-color 0.2s; position: relative; }
    .schedule-item:hover { border-color: #b8956a; }
    .schedule-item.current { background: #1a1915; border-color: #b8956a; }
    .schedule-item.past { opacity: 0.5; }
    .schedule-item.submitted::after { content: '✓'; position: absolute; top: 10px; right: 10px; color: #b8956a; font-size: 16px; }
    .schedule-item-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .schedule-item-week { font-size: 24px; font-weight: 200; color: #777; }
    .schedule-item.current .schedule-item-week { color: #b8956a; }
    .schedule-item-date { font-size: 12px; color: #999; }
    .schedule-item-module { font-size: 13px; color: #b0a090; margin-bottom: 4px; }
    .schedule-item-session { font-size: 11px; color: #888; }
    .calendar-container { display: flex; gap: 24px; flex-wrap: wrap; max-width: 1050px; }
    .calendar-month { background: #141414; border: 1px solid #2a2a2a; border-radius: 5px; padding: 24px; width: 320px; flex: none; }
    .calendar-month-title { font-size: 14px; color: #b8956a; margin-bottom: 16px; text-align: center; letter-spacing: 0.1em; }
    .calendar-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 8px; justify-items: center; }
    .calendar-weekday { font-size: 10px; color: #999; text-align: center; padding: 4px; }
    .calendar-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; justify-items: center; }
    .calendar-day { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #999; background: #1a1a1a; border-radius: 5px; margin: 0 auto; position: relative; }
    .calendar-day.empty { background: transparent; }
    .calendar-day.today { border: 1px solid #b8956a; }
    .calendar-day.logged { background: transparent; }
    .calendar-day.logged .day-number { position: absolute; color: #999; font-weight: 500; font-size: 10px; z-index: 2; right: 4px; bottom: 2px; }
    .calendar-day.lecture::before { content: ''; position: absolute; bottom: 2px; width: 4px; height: 4px; background: #b8956a; border-radius: 50%; }
    .mokumoku { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .calendar-legend { display: flex; gap: 24px; margin-top: 24px; padding: 16px; background: #1a1a1a; border-radius: 5px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #888; }
    .legend-color { width: 12px; height: 12px; border-radius: 2px; }
    .quiz-container { max-width: 700px; margin: 0 auto; }
    @keyframes mokumokuFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes mokumokuFloat2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes quizFadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .quiz-start { padding: 32px 0 24px; animation: quizFadeIn 0.4s ease; }
    .quiz-start-hero { display: flex; flex-direction: column; align-items: center; margin-bottom: 32px; position: relative; }
    .quiz-mascot-wrap { animation: mokumokuFloat 3s ease-in-out infinite; margin-bottom: 16px; }
    .quiz-start-title { font-size: 22px; color: #c8a878; letter-spacing: 0.08em; margin-bottom: 6px; font-weight: 300; }
    .quiz-start-sub { font-size: 13px; color: #999; letter-spacing: 0.05em; }
    .quiz-level-label { font-size: 11px; color: #888; letter-spacing: 0.2em; margin-bottom: 12px; text-align: left; }
    .quiz-level { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 28px; }
    .quiz-level-card { background: #141414; border: 1px solid #2a2a2a; border-radius: 5px; padding: 20px 16px; cursor: pointer; text-align: center; transition: border-color 0.2s, background 0.2s, transform 0.15s; position: relative; overflow: hidden; }
    .quiz-level-card::before { content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity 0.2s; }
    .quiz-level-card[data-level="beginner"]::before { background: radial-gradient(ellipse at 50% 0%, rgba(80,180,100,0.08), transparent 70%); }
    .quiz-level-card[data-level="intermediate"]::before { background: radial-gradient(ellipse at 50% 0%, rgba(180,140,60,0.1), transparent 70%); }
    .quiz-level-card:hover::before { opacity: 1; }
    .quiz-level-card:hover { border-color: #b8956a; transform: translateY(-2px); }
    .quiz-level-card.selected { border-color: #b8956a; background: #1a1915; }
    .quiz-level-card.selected::before { opacity: 1; }
    .quiz-level-icon { margin-bottom: 10px; display: flex; justify-content: center; }
    .quiz-level-name { font-size: 11px; color: #b8956a; letter-spacing: 0.15em; margin-bottom: 4px; }
    .quiz-level-desc { font-size: 12px; color: #888; margin-bottom: 12px; }
    .quiz-level-divider { border: none; border-top: 1px solid #222; margin: 12px 0; }
    .quiz-level-meta { font-size: 11px; color: #888; line-height: 1.9; text-align: left; }
    .quiz-level-meta span { display: block; }
    .quiz-level-meta span::before { content: '—  '; color: #3a3a3a; }
    .quiz-subject { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 24px; }
    .quiz-subject-card { background: #141414; border: 1px solid #2a2a2a; border-radius: 5px; padding: 24px; cursor: pointer; text-align: left; transition: border-color 0.2s; }
    .quiz-subject-card:hover { border-color: #b8956a; }
    .quiz-subject-card.selected { border-color: #b8956a; background: #1a1915; }
    .quiz-subject-title { font-size: 14px; color: #b8956a; margin-bottom: 8px; }
    .quiz-subject-desc { font-size: 13px; color: #888; }
    .btn-quiz { padding: 14px 48px; background: #b8956a; border: none; color: #0a0a0a; font-size: 14px; font-family: inherit; cursor: pointer; border-radius: 5px; transition: background 0.2s, transform 0.15s; display: block; margin: 0 auto; }
    .btn-quiz:hover { background: #a08060; transform: translateY(-1px); }
    .quiz-question { background: #141414; border: 1px solid #2a2a2a; border-radius: 5px; padding: 32px; margin-bottom: 16px; }
    .quiz-meta { display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 12px; color: #999; }
    .quiz-progress { height: 4px; background: #2a2a2a; border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
    .quiz-progress-fill { height: 100%; background: #b8956a; transition: width 0.3s; }
    .quiz-category { font-size: 11px; color: #b8956a; letter-spacing: 0.1em; margin-bottom: 12px; }
    .quiz-text { font-size: 16px; margin-bottom: 24px; line-height: 1.8; }
    .quiz-options { display: grid; gap: 12px; }
    .quiz-option { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 5px; padding: 14px 18px; cursor: pointer; text-align: left; font-size: 14px; display: flex; align-items: center; gap: 12px; }
    .quiz-option:hover:not(.answered) { border-color: #b8956a; }
    .quiz-option.correct { border-color: #b8956a; background: rgba(139,115,85,0.15); color: #d4b896; }
    .quiz-option.wrong { border-color: #6b4444; background: rgba(107,68,68,0.15); color: #aa8888; opacity: 0.7; }
    .quiz-option-label { width: 24px; height: 24px; border: 1px solid #777; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #999; flex-shrink: 0; }
    .quiz-option.correct .quiz-option-label { background: #b8956a; border-color: #b8956a; color: #0a0a0a; }
    .quiz-option.wrong .quiz-option-label { background: #6b4444; border-color: #6b4444; color: #e8e6e3; }
    .quiz-feedback { margin-top: 20px; padding: 16px; background: #1a1915; border-left: 3px solid #b8956a; font-size: 14px; color: #b0a090; display: none; }
    .quiz-feedback.show { display: block; }
    .btn-next { padding: 12px 32px; background: transparent; border: 1px solid #b8956a; color: #b8956a; font-size: 14px; font-family: inherit; cursor: pointer; margin-top: 16px; display: none; }
    .btn-next.show { display: inline-block; }
    .btn-next:hover { background: #b8956a; color: #0a0a0a; }
    .quiz-result { text-align: center; padding: 48px 0; }
    .quiz-result-score { font-size: 64px; font-weight: 200; color: #b8956a; margin-bottom: 16px; }
    .quiz-result-text { font-size: 18px; margin-bottom: 8px; }
    .quiz-result-sub { font-size: 14px; color: #888; margin-bottom: 32px; }
    .footer { border-top: 1px solid #2a2a2a; padding: 24px 48px; display: flex; justify-content: space-between; background: #0a0a0a; margin-top: 48px; }
    .footer-text { font-size: 12px; color: #777; }
    .header-mokumoku-float { animation: mokumokuFloat2 3s ease-in-out infinite; display: inline-flex; }
    .mokumoku-message { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1a1a1a; border: 2px solid #b8956a; border-radius: 20px; padding: 16px 24px; display: flex; align-items: center; gap: 16px; z-index: 1000; animation: mokumokuPop 0.3s ease; }
    .mokumoku-message-text { color: #e8e6e3; font-size: 14px; }
    @keyframes mokumokuPop { from { transform: translateX(-50%) scale(0.8); opacity: 0; } to { transform: translateX(-50%) scale(1); opacity: 1; } }
    @media (max-width: 900px) {
      .header { padding: 16px 24px; flex-direction: column; gap: 16px; align-items: flex-start; }
      .nav { padding: 0 24px; overflow-x: auto; }
      .nav-btn { padding: 12px 20px; white-space: nowrap; }
      .main { padding: 24px; }
      .schedule-grid { grid-template-columns: repeat(2, 1fr); }
      .footer { padding: 16px 24px; flex-direction: column; gap: 8px; }
      .learning-section { padding: 24px; }
      .calendar-container { flex-direction: column; }
      .calendar-month { min-width: auto; }
      .mokumoku-message { bottom: 20px; right: 20px; left: auto; transform: none; padding: 10px 16px; font-size: 12px; }
      .mokumoku-message svg { width: 32px; height: 28px; } }
    .note-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; border: 1px solid #b8956a; padding: 24px; z-index: 1000; min-width: 280px; max-width: 400px; animation: popupIn 0.2s ease; border-radius: 4px; }
    .note-popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; }
    .note-popup-date { font-size: 11px; color: #b8956a; letter-spacing: 0.1em; margin-bottom: 8px; }
    .note-popup-title { font-size: 14px; color: #e8e6e3; margin-bottom: 16px; }
    .note-popup-btn { padding: 8px 20px; background: transparent; border: 1px solid #b8956a; color: #b8956a; font-size: 13px; font-family: inherit; cursor: pointer; margin-right: 8px; border-radius: 4px; }
    .note-popup-btn:hover { background: #b8956a; color: #0a0a0a; }
    @keyframes popupIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
    .calendar-day .note-mark { position: absolute; bottom: 2px; left: 3px; font-size: 7px; color: #b8956a; font-weight: 500; }
    .calendar-day.logged .mokumoku { top: 2px; left: auto; right: 2px; transform: none; }
    .calendar-day.logged .mokumoku svg { width: 18px; height: 16px; }
  </style>
</head>
<body>
  <header class="header">
    <div>
      <p class="header-title-sub">UX/UI Design Program</p>
      <h1 class="header-title-main">
       UI
       <span class="header-mokumoku-float"><svg width="40" height="32" viewBox="0 0 44 36" style="margin: 0 4px;">
        <mask id="eyeMask"><rect width="100%" height="100%" fill="white"/><circle cx="24" cy="16" r="2" fill="black"/><circle cx="30" cy="18" r="2" fill="black"/></mask>
        <g mask="url(#eyeMask)"><ellipse cx="10" cy="22" rx="9" ry="8" fill="#b8956a"/><ellipse cx="22" cy="16" rx="14" ry="12" fill="#b8956a"/><ellipse cx="36" cy="22" rx="8" ry="7" fill="#b8956a"/><ellipse cx="16" cy="26" rx="10" ry="8" fill="#b8956a"/><ellipse cx="30" cy="26" rx="10" ry="8" fill="#b8956a"/></g>
        <path d="M14 23 L15 27 L18 25" stroke="#0a0a0a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
       </svg></span>
       UX
      </h1>
      <p class="header-module-name" id="header-module-name" style="display:none;"></p>
    </div>
    <div class="header-progress">
      <span class="progress-label">PROGRESS</span>
      <span class="progress-value" id="progress-percent">0%</span>
      <div class="progress-bar">
        <div class="progress-bar-fill" id="progress-bar-fill" style="width: 0%;"></div>
      </div>
    </div>
    <div class="data-sync-btns">
      <button class="sync-btn" onclick="exportData()" title="データをJSONで保存">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 1v7M3 6l3 3 3-3"/><path d="M1 10h10"/></svg>
        保存
      </button>
      <label class="sync-btn" title="JSONを読み込む" style="cursor:pointer;">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 11V4M3 6l3-3 3 3"/><path d="M1 10h10"/></svg>
        読込
        <input type="file" accept=".json" onchange="importData(event)" style="display:none;">
      </label>
    </div>
  </header>

  <div class="module-fixed-bar" id="module-fixed-bar">
    <p class="module-fixed-bar-text" id="module-fixed-bar-text"></p>

      { title: "6. アイデアをユーザー行動に変換", content: "アイデアは「機能」として考えるのではなく、「ユーザーがどう行動するか」として考えます。「通知機能」ではなく「ユーザーが自然にサービスを思い出して戻ってくる」という行動の変化として描くことで、設計の目的が明確になります。機能ではなく行動を起点にすることで、本当に必要なものが見えてきます。" },
      { title: "7. ユーザーストーリーマッピング（USM）の作成", content: "ユーザーストーリーマッピングは、ユーザーの行動を時系列（左から右）と詳細度（上から下）の2軸で整理する手法です。上の行には「大きな行動（知る・使う・続ける）」、下の行には「具体的な操作・機能」を並べます。全体像を俯瞰しながら、何が足りないか・何が重複しているかを発見できます。" },

  E: {
    overview: "このモジュールでは、アイデアを「画面」に落とし込む技法を学びます。何をどこに置くか、どう繋げるか、どう伝えるか。情報設計はユーザーが迷わず目的を達成できる「構造」を作る仕事です。見た目の前に、まず構造を設計することを身につけます。",
    topics: [

      { title: "4. 要件定義・画面仕様", content: "要件定義とは「何を作るか」を明文化することです。画面仕様はその要件を画面レベルで詳細化したものです。「ログイン画面にはメールアドレス入力欄・パスワード入力欄・送信ボタン・パスワード忘れリンクが必要」のように、画面ごとに必要な要素を列挙します。曖昧なままデザインに進むと手戻りが発生します。" },
      { title: "5. UXライティング・ラベル設計", content: "UXライティングとは、ボタンのラベル・エラーメッセージ・ツールチップなど、インターフェース上の言葉を設計することです。「送信」より「申し込む」、「エラーが発生しました」より「メールアドレスの形式が正しくありません。@を含めて入力してください」の方がユーザーを助けます。言葉はデザインの一部です。" },
      { title: "6. オブジェクトベース／タスクベース", content: "情報設計には2つのアプローチがあります。タスクベースは「何をするか（動詞）」中心の設計で、「予約する」「検索する」などの操作を軸にナビゲーションを組みます。オブジェクトベースは「何があるか（名詞）」中心の設計で、「商品」「注文」「ユーザー」などのモノを軸に整理します。デジタルサービスではオブジェクトベースが設計しやすい場合が多いです。" },
      { title: "7. 画面レイアウト・トーン＆マナー", content: "画面レイアウトとは、情報の配置・優先順位・余白のルールです。トーン＆マナーとは、デザイン全体を通じた統一感のこと。フォント・色・角の丸み・余白のサイズなどを一貫させることで、ユーザーは「学習コスト」なしにサービスを使い続けられます。ワイヤーフレームの段階でレイアウトの基本ルールを決めておきます。" },
      { title: "8. アクセシビリティ／ユニバーサルデザイン", content: "アクセシビリティとは、障害のある人・高齢者・異なる環境のユーザーがサービスを利用できることを保証する設計です。色のコントラスト比・文字サイズ・キーボード操作対応などが基準になります（WCAG）。ユニバーサルデザインはさらに広く、最初からあらゆる人が使えることを目指す思想です。アクセシビリティ対応は結果的にすべてのユーザーの体験を改善します。" }

  F: {
    overview: "このモジュールでは、情報設計をもとに実際の画面をデザインする技法を学びます。「見た目を整える」のではなく「見た目で機能させる」ことが目的です。配置・余白・色・タイポグラフィの原則を理解し、Figmaを使ってプロトタイプを作るまでを身につけます。",
    topics: [
      { title: "1. UIデザイン／配置の5原則", content: "UIデザインの配置には5つの基本原則があります。①近接（関連する要素は近くに置く）、②整列（要素を見えない線に沿って並べる）、③反復（同じパターンを繰り返して統一感を出す）、④コントラスト（重要なものを目立たせる）、⑤余白（詰め込まず空間を意図的に使う）。この5原則を意識するだけで、画面の読みやすさは大きく変わります。" },
      { title: "2. Figma／プロトタイプ機能", content: "FigmaはUIデザインの標準ツールです。フレーム・コンポーネント・オートレイアウトの3つが基本機能です。プロトタイプ機能を使うと、画面同士をリンクして実際の操作感をシミュレートできます。コードを書かずにインタラクションを確認できるため、開発前の検証に欠かせません。" },
      { title: "3. ワイヤーフレーム作成", content: "ワイヤーフレームとは、色やフォントを使わずに画面の骨格だけを描いたものです。グレーのボックスとテキストだけで構成します。色やビジュアルを入れないことで「この配置は正しいか」「この情報量は適切か」に集中できます。ワイヤーフレームはビジュアルデザインの前に必ず作ります。" },
      { title: "4. ナビゲーションデザイン", content: "ナビゲーションはユーザーが「今どこにいるか」「どこへ行けるか」を伝えるシステムです。グローバルナビゲーション（サイト全体）、ローカルナビゲーション（セクション内）、パンくずリスト（現在位置）など種類があります。良いナビゲーションは目立ちません。ユーザーが迷わないとき、ナビゲーションは透明になります。" },
      { title: "5. インターフェースとインタラクション", content: "インターフェースとは、ユーザーとシステムが接する面全体です。インタラクションとは、ユーザーの操作に対してシステムがどう反応するかの設計です。ボタンを押したときの色変化、ローディングアニメーション、エラー時の揺れなど、細かいインタラクションがサービスの「使った感じ」を大きく左右します。" },
      { title: "6. Refactoring UI", content: "Refactoring UIはAdam WathanとSteve Schoggerによるデザイン改善の考え方です。「階層をはっきりさせる」「色に頼らず形で伝える」「余白を大胆に取る」「システムフォントより適切なフォントを選ぶ」など、具体的な改善手法が多く紹介されています。デザインの「なぜこれが良く見えるのか」を言語化するのに役立ちます。" },
      { title: "7. デザインガイドライン", content: "デザインガイドラインとは、色・フォント・余白・コンポーネントのルールをまとめたドキュメントです。チームで一貫したデザインを作るために必要です。AppleのHuman Interface Guidelines、GoogleのMaterial Designが代表例です。自分のプロジェクトでも、最初に小さなガイドラインを作ることで、後の作業が大幅にスムーズになります。" },
      { title: "8. プロトタイプ制作", content: "プロトタイプとは「動く模型」です。忠実度（fidelity）によって紙・ワイヤーフレーム・高忠実度Figmaと使い分けます。目的は「作り込む前に学ぶ」こと。プロトタイプをユーザーに見せて反応を観察することで、開発前に設計の問題を発見できます。プロトタイプは捨てるために作るものです。" }

  G: {
    overview: "このモジュールでは、作ったデザインをユーザーに試してもらい、問題を発見する技法を学びます。ユーザビリティテストは「評価」ではなく「学習」のためのツールです。5人に試してもらうだけで、主要な問題の85%が発見できると言われています。",
    topics: [
      { title: "1. 検証リサーチ概論", content: "検証リサーチとは「この設計は正しいか」を確認するためのリサーチです。Module Cの探索リサーチとは目的が異なります。探索は「何が問題か」を見つけるもの、検証は「この解決策は機能するか」を確かめるものです。ユーザビリティテストは検証リサーチの代表的な手法で、プロトタイプや実際のサービスをユーザーに操作してもらい、観察します。" },
      { title: "2. プロトタイピング検証", content: "プロトタイプの検証とは、設計の仮説をユーザーの行動データで確かめることです。「このボタンは押してもらえるか」「このフローは完了できるか」を観察します。重要なのは「このデザインは気に入りましたか？」と聞くのではなく、実際に操作してもらうことです。人は言葉と行動が一致しないため、行動の観察が本質です。" },
      { title: "3. デモンストレーション", content: "テスト本番の前に、参加者にテストの進め方を説明するデモンストレーションが必要です。「これはあなたを評価するものではなく、デザインを評価するものです」という説明が心理的安全性を高めます。また「操作しながら頭の中で考えていることを声に出してください（Think Aloud）」という指示が、観察で得られる情報を豊かにします。" },
      { title: "4. タスク作成／タスクのレビュー", content: "ユーザビリティテストではユーザーに「タスク」を渡します。タスクとは「○○してください」という具体的な課題です。良いタスクの条件は、①現実的な状況設定がある、②答えを誘導しない、③完了基準が明確、の3つです。「検索機能を使ってください」ではなく「東京から大阪への新幹線を明日の朝予約してください」のように書きます。" },
      { title: "5. ユーザビリティテスト実査", content: "テスト当日は、モデレーター（進行役）とオブザーバー（観察記録役）に分かれます。モデレーターはユーザーの操作を誘導せず、詰まったときも「どうしたいですか？」と聞くだけにします。オブザーバーは「どこで迷ったか」「何を読まなかったか」「表情がどう変わったか」を記録します。テスト後に振り返りセッションを必ず行います。" },
      { title: "6. 検証リサーチ分析方法", content: "テスト結果を分析するには、観察した問題点を「発生した箇所」「深刻度」「頻度」で整理します。深刻度は①タスク失敗（致命的）、②大幅に遅れる（重大）、③戸惑うが完了できる（軽微）の3段階で分類するのが一般的です。全問題を解決しようとせず、深刻度と頻度の高いものから優先的に対処します。" },
      { title: "7. プロトタイピング改善", content: "テスト結果をもとにプロトタイプを改善します。重要なのは「ユーザーが言ったこと」ではなく「ユーザーが詰まった箇所」をもとに改善することです。ユーザーの提案をそのまま実装するのではなく、「なぜ詰まったのか」という根本原因を探り、設計で解決します。改善後は再びテストして検証するサイクルを回します。" },
      { title: "8. プレゼンテーション／講評", content: "テスト結果と改善案をチームやクライアントにプレゼンするスキルも重要です。「ユーザーはここで詰まりました」という事実と、「なぜそれが起きたか」という分析と、「どう改善するか」という提案の3点セットで伝えます。ユーザーの声や行動の動画クリップは、データよりも説得力を持ちます。" }

function showNotePopup(dateStr) {
  const notes = NOTES[dateStr];
  if (!notes || notes.length === 0) return;
  closeNotePopup();
  const overlay = document.createElement('div');
  overlay.className = 'note-popup-overlay';
  overlay.onclick = closeNotePopup;
  const popup = document.createElement('div');
  popup.className = 'note-popup';
  let html = `<p class="note-popup-date">${dateStr}</p>`;
  notes.forEach(note => {
    html += `<p class="note-popup-title">📝 ${note.title}</p>`;
    html += `<button class="note-popup-btn" onclick="window.open('notes/${note.file}', '_blank')">開く</button>`;
  });
  html += `<button class="note-popup-btn" onclick="closeNotePopup()">閉じる</button>`;
  popup.innerHTML = html;
  document.body.appendChild(overlay);
  document.body.appendChild(popup);
}

function closeNotePopup() {
  const overlay = document.querySelector('.note-popup-overlay');
  const popup = document.querySelector('.note-popup');
  if (overlay) overlay.remove();
  if (popup) popup.remove();
}

function getCurrentWeek() {
  const now = new Date();
  const start = new Date('2026-03-04');
  const diff = Math.ceil((now - start) / (1000 * 60 * 60 * 24));
  return Math.max(1, Math.min(Math.ceil(diff / 7), 20));
}
function getModuleById(id) { return CURRICULUM.find(m => m.id === id); }
function getModuleForWeek(week) { return SCHEDULE.find(s => s.week === week)?.module; }
function formatDate(dateStr) {
  const d = new Date(dateStr);
  const wd = ['日','月','火','水','木','金','土'];
  return `${d.getMonth()+1}/${d.getDate()}（${wd[d.getDay()]}）`;
}
function getProgress() {
  let total = 0, completed = 0;
  CURRICULUM.forEach(m => {
    if (LEARNING_CONTENT[m.id]) {
      LEARNING_CONTENT[m.id].worksheets.forEach(ws => {
        total++;
        if (submittedTasks[m.id] && submittedTasks[m.id][ws.id]) completed++;
      });
    }
  });
  return total > 0 ? Math.round((completed / total) * 100) : 0;
}
function saveState() {
  localStorage.setItem('bokan_submitted_tasks', JSON.stringify(submittedTasks));
  localStorage.setItem('bokan_worksheet', JSON.stringify(worksheetData));
  localStorage.setItem('bokan_feedback', JSON.stringify(feedbackData));
  localStorage.setItem('bokan_logins', JSON.stringify(loginDates));
}
function getMokumokuSvg(dateStr) {
  const sorted = [...loginDates].sort();
  const idx = sorted.indexOf(dateStr);
  if (idx === 0) return MOKUMOKU_NORMAL;
  const prev = new Date(sorted[idx - 1]);
  const curr = new Date(dateStr);
  const diff = Math.floor((curr - prev) / (1000 * 60 * 60 * 24));
  if (diff >= 3) return MOKUMOKU_SUPER;
  if (diff >= 2) return MOKUMOKU_HAPPY;
  return MOKUMOKU_NORMAL;
}
function showMokumokuMessage(text) {
  const existing = document.querySelector('.mokumoku-message');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.className = 'mokumoku-message';
  div.innerHTML = MOKUMOKU_MSG + `<span class="mokumoku-message-text">${text}</span>`;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2500);
}
function goToLearning(moduleId) {
  const m = getModuleById(moduleId);
  if (m && m.hasContent) {
    selectedModule = moduleId;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-tab="learning"]').classList.add('active');
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-learning').classList.add('active');
    renderModuleSelect();
    renderLearningContent();
  }
}
function exportData() {
  const data = { version: 1, exportedAt: new Date().toISOString(), submittedTasks, worksheetData, feedbackData, loginDates };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `bokan_data.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showMokumokuMessage('データを保存したよ！');
}
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.version) throw new Error('invalid');
      if (data.submittedTasks) Object.assign(submittedTasks, data.submittedTasks);
      if (data.worksheetData) Object.assign(worksheetData, data.worksheetData);
      if (data.feedbackData) Object.assign(feedbackData, data.feedbackData);
      if (data.loginDates) { loginDates = [...new Set([...loginDates, ...data.loginDates])].sort(); }
      saveState();
      updateProgress();
      renderLearningContent();
      renderCalendar();
      renderSchedule();
      showMokumokuMessage('データを読み込んだよ！');
    } catch { showMokumokuMessage('読み込みに失敗したよ…'); }
    event.target.value = '';
  };
  reader.readAsText(file);
}
function updateProgress() {
  document.getElementById('progress-percent').textContent = getProgress() + '%';
  document.getElementById('progress-bar-fill').style.width = getProgress() + '%';
}
function renderModuleSelect() {
  const currentWeek = getCurrentWeek();
  const currentModuleId = getModuleForWeek(currentWeek);
  const container = document.getElementById('learning-module-select');
  container.innerHTML = CURRICULUM.map(m => {
    let cls = 'learning-module-btn';
    if (m.id === selectedModule) cls += ' active';
    if (!m.hasContent) cls += ' locked';
    if (m.id === currentModuleId) cls += ' current';
    return `<button class="${cls}" data-module="${m.id}" ${!m.hasContent ? 'disabled' : ''}>${m.id}</button>`;
  }).join('');
  container.querySelectorAll('.learning-module-btn:not(.locked)').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedModule = btn.dataset.module;
      renderModuleSelect();
      renderLearningContent();
    });
  });
}

function renderTopicContent(content) {
  // \n\n を段落として処理
  const paragraphs = content.split('\n\n').filter(p => p.trim());
  return paragraphs.map(p => `<p>${p.trim()}</p>`).join('');
}

function renderLearningContent() {
  const container = document.getElementById('learning-content-area');
  const m = getModuleById(selectedModule);
  const c = LEARNING_CONTENT[selectedModule];
  const nameEl = document.getElementById('learning-module-name');
  const headerNameEl = document.getElementById('header-module-name');
  const fixedBarText = document.getElementById('module-fixed-bar-text');
  const label = c ? `MODULE ${m.id} — ${m.title}` : '';
  if (nameEl) nameEl.textContent = label;
  if (fixedBarText) fixedBarText.innerHTML = c ? `MODULE <span>${m.id}</span> — <span>${m.title}</span>` : '';
  if (headerNameEl) { headerNameEl.textContent = label; headerNameEl.style.display = c ? 'block' : 'none'; }
  if (!c) {
    container.innerHTML = `<div class="learning-section"><p style="color:#999;text-align:center;padding:48px 0;">このモジュールは準備中です。</p></div>`;
    return;
  }
  const data = worksheetData[selectedModule] || {};
  const fb = feedbackData[selectedModule] || {};
  const submitted = submittedTasks[selectedModule] || {};

  // トピックのHTML生成（isPlus対応）
  const topicsHtml = c.topics.map(t => {
    const wrapClass = t.isPlus ? 'topic-block topic-plus' : 'topic-block';
    return `<div class="${wrapClass}">
      <div class="topic-title">${t.title}</div>
      <div class="topic-body">${renderTopicContent(t.content)}</div>
    </div>`;
  }).join('');

  container.innerHTML = `
    <div class="learning-section">
      <h3 class="learning-section-title">MODULE ${m.id}: ${m.title}</h3>
      <div class="learning-content"><p>${c.overview}</p></div>
    </div>
    <div class="learning-section">
      <h3 class="learning-section-title">トピック解説</h3>
      ${topicsHtml}
    </div>
    <div class="learning-section">
      <h3 class="learning-section-title">参考資料</h3>
      ${c.references.map(r => `<div class="reference-item"><p class="reference-item-title">${r.title}</p><p class="reference-item-author">${r.author}</p><p class="reference-item-desc">${r.desc}</p></div>`).join('')}
    </div>
    ${c.worksheets.map(ws => `
      <div class="learning-section">
        <h3 class="learning-section-title">${ws.title}（Session ${ws.session}）</h3>
        <p class="worksheet-desc">${ws.desc}</p>
        ${ws.fields.map(f => `
          <div class="worksheet-field">
            <label class="worksheet-label">${f.label}</label>
            ${f.type === 'input'
              ? `<input type="text" class="worksheet-input" data-module="${selectedModule}" data-task="${ws.id}" data-field="${ws.id}_${f.id}" value="${data[ws.id+'_'+f.id] || ''}">`
              : `<textarea class="worksheet-textarea" data-module="${selectedModule}" data-task="${ws.id}" data-field="${ws.id}_${f.id}">${data[ws.id+'_'+f.id] || ''}</textarea>`}
          </div>
        `).join('')}
        <button class="btn-submit ${submitted[ws.id] ? 'submitted' : ''}" onclick="downloadTask('${m.id}', '${ws.id}')">
          ${submitted[ws.id] ? '✓ 提出済み — 再提出する' : 'この課題を提出する'}
        </button>
        <div class="feedback-section">
          <label class="feedback-label">フィードバック記録</label>
          <textarea class="feedback-textarea" data-module="${selectedModule}" data-feedback="${ws.id}">${fb[ws.id] || ''}</textarea>
        </div>
      </div>
    `).join('')}
  `;

  container.querySelectorAll('.worksheet-input, .worksheet-textarea').forEach(el => {
    el.addEventListener('input', () => {
      const mod = el.dataset.module;
      const field = el.dataset.field;
      if (field) {
        if (!worksheetData[mod]) worksheetData[mod] = {};
        worksheetData[mod][field] = el.value;
        saveState();
      }
    });
  });
  container.querySelectorAll('.feedback-textarea').forEach(el => {
    el.addEventListener('input', () => {
      const mod = el.dataset.module;
      const fbId = el.dataset.feedback;
      if (!feedbackData[mod]) feedbackData[mod] = {};
      feedbackData[mod][fbId] = el.value;
      saveState();
    });
  });
}

function downloadTask(moduleId, taskId) {
  const c = LEARNING_CONTENT[moduleId];
  const ws = c.worksheets.find(w => w.id === taskId);
  const data = worksheetData[moduleId] || {};
  let allFilled = true;
  ws.fields.forEach(f => {
    const val = data[ws.id + '_' + f.id];
    if (!val || val.trim() === '') allFilled = false;
  });
  if (!allFilled) { showMokumokuMessage('全部書いてからね！'); return; }
  const m = getModuleById(moduleId);
  let md = `# Module ${m.id}: ${m.title}\n\n## ${ws.title}\n\n${ws.desc}\n\n---\n\n`;
  ws.fields.forEach(f => { md += `### ${f.label}\n\n${data[ws.id+'_'+f.id] || ''}\n\n`; });
  md += `---\n\n提出日: ${new Date().toLocaleDateString('ja-JP')}`;
  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Module_${m.id}_${ws.title}.md`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  if (!submittedTasks[moduleId]) submittedTasks[moduleId] = {};
  submittedTasks[moduleId][taskId] = true;
  saveState();
  updateProgress();
  renderLearningContent();
  renderSchedule();
  showMokumokuMessage('提出できたよ！');
}

function renderCalendar() {
  const container = document.getElementById('calendar-container');
  const months = [
    { year: 2026, month: 3, name: '3月 MARCH' },
    { year: 2026, month: 4, name: '4月 APRIL' },
    { year: 2026, month: 5, name: '5月 MAY' },
    { year: 2026, month: 6, name: '6月 JUNE' },
    { year: 2026, month: 7, name: '7月 JULY' }
  ];
  const lectureDates = SCHEDULE.map(s => s.date);
  const todayStr = new Date().toLocaleDateString('sv-SE', {timeZone: 'Asia/Tokyo'});
  container.innerHTML = months.map(m => {
    const firstDay = new Date(m.year, m.month - 1, 1);
    const lastDay = new Date(m.year, m.month, 0);
    const startPadding = firstDay.getDay();
    const daysInMonth = lastDay.getDate();
    let daysHtml = '';
    for (let i = 0; i < startPadding; i++) daysHtml += '<div class="calendar-day empty"></div>';
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${m.year}-${String(m.month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isLogged = loginDates.includes(dateStr);
      const isToday = dateStr === todayStr;
      const isLecture = lectureDates.includes(dateStr);
      let cls = 'calendar-day';
      if (isLogged) cls += ' logged';
      if (isToday) cls += ' today';
      if (isLecture) cls += ' lecture';
      if (isLogged && NOTES[dateStr]) {
        daysHtml += `<div class="${cls}" style="cursor:pointer;" onclick="showNotePopup('${dateStr}')"><div class="mokumoku">${getMokumokuSvg(dateStr)}</div><span class="day-number">${d}</span><div class="note-mark">N</div></div>`;
      } else if (isLogged) {
        daysHtml += `<div class="${cls}"><div class="mokumoku">${getMokumokuSvg(dateStr)}</div><span class="day-number">${d}</span></div>`;
      } else if (NOTES[dateStr]) {
        daysHtml += `<div class="${cls}" style="cursor:pointer;" onclick="showNotePopup('${dateStr}')">${d}<div class="note-mark">N</div></div>`;
      } else {
        daysHtml += `<div class="${cls}">${d}</div>`;
      }
    }
    return `<div class="calendar-month"><div class="calendar-month-title">${m.name}</div><div class="calendar-weekdays"><div class="calendar-weekday">日</div><div class="calendar-weekday">月</div><div class="calendar-weekday">火</div><div class="calendar-weekday">水</div><div class="calendar-weekday">木</div><div class="calendar-weekday">金</div><div class="calendar-weekday">土</div></div><div class="calendar-days">${daysHtml}</div></div>`;
  }).join('');
}

function renderSchedule() {
  const week = getCurrentWeek();
  document.getElementById('schedule-grid').innerHTML = SCHEDULE.map(s => {
    const m = getModuleById(s.module);
    const isSubmitted = submittedTasks[s.module] && Object.keys(submittedTasks[s.module]).length > 0;
    let cls = 'schedule-item';
    if (s.week < week) cls += ' past';
    if (s.week === week) cls += ' current';
    if (isSubmitted) cls += ' submitted';
    return `<div class="${cls}" data-module="${s.module}"><div class="schedule-item-header"><span class="schedule-item-week">W${s.week}</span><span class="schedule-item-date">${formatDate(s.date)}</span></div><p class="schedule-item-module">${m.id}. ${m.title}</p><p class="schedule-item-session">Session ${s.session}/2</p></div>`;
  }).join('');
  document.querySelectorAll('.schedule-item').forEach(item => {
    item.addEventListener('click', () => goToLearning(item.dataset.module));
  });
}

function renderQuiz() {
  const container = document.getElementById('quiz-container');
  if (quizState === 'start') {
    container.innerHTML = `
      <div class="quiz-start">
        <div class="quiz-start-hero">
          <div class="quiz-mascot-wrap">
            <svg width="64" height="52" viewBox="0 0 44 36" fill="none">
              <mask id="qMask"><rect width="100%" height="100%" fill="white"/><circle cx="24" cy="16" r="2" fill="black"/><circle cx="30" cy="18" r="2" fill="black"/></mask>
              <g mask="url(#qMask)">
                <ellipse cx="10" cy="22" rx="9" ry="8" fill="#b8956a"/>
                <ellipse cx="22" cy="16" rx="14" ry="12" fill="#a08060"/>
                <ellipse cx="36" cy="22" rx="8" ry="7" fill="#b8956a"/>
                <ellipse cx="16" cy="26" rx="10" ry="8" fill="#b8956a"/>
                <ellipse cx="30" cy="26" rx="10" ry="8" fill="#b8956a"/>
              </g>
              <path d="M14 23 L15 27 L18 25" stroke="#0a0a0a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="quiz-start-title">UX/UI クイズ</div>
          <div class="quiz-start-sub">学習内容の理解度をチェックしよう</div>
        </div>
        <div class="quiz-level-label">// LEVEL を選ぶ</div>
        <div class="quiz-level">
          <div class="quiz-level-card ${quizLevel==='beginner'?'selected':''}" data-level="beginner">
            <div class="quiz-level-icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#50b464" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22V12"/><path d="M12 12C12 12 7 10 5 6c4 0 7 2 7 6z" fill="rgba(80,180,100,0.15)"/>
                <path d="M12 12C12 12 17 10 19 6c-4 0-7 2-7 6z" fill="rgba(80,180,100,0.15)"/>
              </svg>
            </div>
            <div class="quiz-level-name">BEGINNER</div>
            <div class="quiz-level-desc">基礎から確認</div>
            <hr class="quiz-level-divider">
            <div class="quiz-level-meta">
              <span>10問 / 約5分</span>
              <span>UXの定義・時間軸</span>
              <span>5階層・認知心理学</span>
            </div>
          </div>
          <div class="quiz-level-card ${quizLevel==='intermediate'?'selected':''}" data-level="intermediate">
            <div class="quiz-level-icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#c8a030" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="rgba(200,160,48,0.12)"/>
              </svg>
            </div>
            <div class="quiz-level-name">INTERMEDIATE</div>
            <div class="quiz-level-desc">一歩踏み込む</div>
            <hr class="quiz-level-divider">
            <div class="quiz-level-meta">
              <span>10問 / 約8分</span>
              <span>行動変容・仮説思考</span>
              <span>リサーチ・情報設計</span>
            </div>
          </div>
        </div>
        <button class="btn-quiz" id="btn-start-quiz">クイズを始める →</button>
      </div>
    `;
    container.querySelectorAll('.quiz-level-card').forEach(c => {
      c.addEventListener('click', () => { quizLevel = c.dataset.level; renderQuiz(); });
    });
    document.getElementById('btn-start-quiz').addEventListener('click', startQuiz);
  } else if (quizState === 'question') {
    const q = quizQuestions[quizIndex];
    const labels = ['A','B','C','D'];
    container.innerHTML = `
      <div class="quiz-meta"><span>問題 ${quizIndex+1} / ${quizQuestions.length}</span><span>正解: ${quizScore}</span></div>
      <div class="quiz-progress"><div class="quiz-progress-fill" style="width:${(quizIndex/quizQuestions.length)*100}%"></div></div>
      <div class="quiz-question">
        <div class="quiz-category">${q.category}</div>
        <div class="quiz-text">${q.text}</div>
        <div class="quiz-options">${q.options.map((opt,i) => `<div class="quiz-option" data-index="${i}"><span class="quiz-option-label">${labels[i]}</span><span>${opt}</span></div>`).join('')}</div>
        <div class="quiz-feedback" id="quiz-feedback"></div>
      </div>
      <button class="btn-next" id="btn-next-quiz">次の問題へ →</button>
    `;
    container.querySelectorAll('.quiz-option').forEach(opt => {
      opt.addEventListener('click', () => checkQuizAnswer(parseInt(opt.dataset.index)));
    });
    document.getElementById('btn-next-quiz').addEventListener('click', nextQuestion);
  } else if (quizState === 'result') {
    const pct = Math.round((quizScore / quizQuestions.length) * 100);
    let msg = pct >= 80 ? '素晴らしい！' : pct >= 60 ? 'よくできました！' : 'もう一度復習しよう';
    container.innerHTML = `
      <div class="quiz-result">
        <div class="quiz-result-score">${quizScore}/${quizQuestions.length}</div>
        <div class="quiz-result-text">${msg}</div>
        <div class="quiz-result-sub">正答率: ${pct}%</div>
        <button class="btn-quiz" id="btn-retry">もう一度挑戦</button>
        <button class="btn-next" style="display:inline-block;margin-left:12px;" id="btn-back">戻る</button>
      </div>
    `;
    document.getElementById('btn-retry').addEventListener('click', () => { quizState = 'start'; renderQuiz(); });
    document.getElementById('btn-back').addEventListener('click', () => { quizState = 'start'; renderQuiz(); });
  }
}

function startQuiz() {
  quizQuestions = [...QUIZ_QUESTIONS[quizLevel]].sort(() => Math.random() - 0.5).slice(0, 10);
  quizIndex = 0; quizScore = 0; quizAnswered = false; quizState = 'question';
  renderQuiz();
}
function nextQuestion() {
  quizIndex++; quizAnswered = false;
  if (quizIndex >= quizQuestions.length) quizState = 'result';
  renderQuiz();
}
function checkQuizAnswer(idx) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizQuestions[quizIndex];
  const options = document.querySelectorAll('.quiz-option');
  options.forEach((opt, i) => {
    opt.classList.add('answered');
    if (i === q.correct) opt.classList.add('correct');
    else if (i === idx) opt.classList.add('wrong');
  });
  const isCorrect = idx === q.correct;
  if (isCorrect) { quizScore++; showMokumokuMessage('正解！すごい！'); }
  const fb = document.getElementById('quiz-feedback');
  fb.innerHTML = isCorrect
    ? `<strong style="color:#b8956a;">正解！</strong> ${q.explanation}`
    : `<strong style="color:#aa6666;">残念...</strong> ${q.explanation}`;
  fb.classList.add('show');
  document.getElementById('btn-next-quiz').classList.add('show');
}

function initNavigation() {
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      const headerNameEl = document.getElementById('header-module-name');
      if (btn.dataset.tab !== 'learning') {
        if (headerNameEl) headerNameEl.style.display = 'none';
        document.getElementById('module-fixed-bar').classList.remove('show');
      } else { renderLearningContent(); }
    });
  });
  window.addEventListener('scroll', () => {
    const learningTab = document.getElementById('tab-learning');
    if (!learningTab.classList.contains('active')) return;
    const header = document.querySelector('.learning-section-header');
    if (!header) return;
    const bar = document.getElementById('module-fixed-bar');
    const rect = header.getBoundingClientRect();
    if (rect.bottom < 0) { bar.classList.add('show'); } else { bar.classList.remove('show'); }
  });
}

function init() {
  initNavigation();
  renderModuleSelect();
  renderLearningContent();
  renderCalendar();
  renderSchedule();
  renderQuiz();
  updateProgress();
}

document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
